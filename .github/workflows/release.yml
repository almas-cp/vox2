name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck
        run: shellcheck bin/vox

      - name: Smoke test
        run: |
          chmod +x bin/vox
          bin/vox --version
          bin/vox --help

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/vox
          generate_release_notes: true
